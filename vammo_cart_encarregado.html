  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Barlow', sans-serif;
    background:var(--bk); color:var(--wh);
    min-height:100vh;
    user-select:none; -webkit-user-select:none;
    -webkit-overflow-scrolling: touch;
  }

  .top-bar {
    height:64px; flex-shrink:0;
    background:var(--dk);
    border-bottom:2px solid var(--bd);
    display:flex; align-items:center;
    padding:0 22px; gap:18px;
    position:sticky; top:0; z-index:40;
  }
  .top-bar .logo {
    font-family:'Barlow Condensed', sans-serif;
    font-weight:900; font-size:26px;
    letter-spacing:3px; color:var(--az);
    text-transform:uppercase;
  }
  .top-bar .sep { color:var(--bd); font-size:22px; }
  .top-bar .title {
    font-family:'Barlow Condensed', sans-serif;
    font-size:22px; font-weight:800;
    letter-spacing:2.5px; text-transform:uppercase;
    color:var(--wh);
  }
  .top-bar .spacer { flex:1; }
  .sync-badge {
    font-size:13px; color:var(--gr); letter-spacing:1px;
    font-family:'Barlow Condensed',sans-serif;
    display:flex; align-items:center; gap:6px;
  }
  .sync-badge .dot { width:10px; height:10px; border-radius:50%; background:var(--gr); }
  .sync-badge.ok .dot { background:var(--gn); box-shadow:0 0 8px var(--gn); }
  .sync-badge.loading .dot { background:var(--yw); animation:pulseDot 1s infinite; }
  @keyframes pulseDot { 0%,100% { opacity:1 } 50% { opacity:.3 } }
  .top-bar .icon-btn {
    width:44px; height:44px; border-radius:10px;
    background:transparent; border:1px solid var(--bd);
    color:var(--w2); cursor:pointer; font-size:20px;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .top-bar .icon-btn:hover, .top-bar .icon-btn:active { background:var(--c2); color:var(--az); border-color:var(--az); }

  .page-body {
    padding:18px 22px;
    display:flex; flex-direction:column; gap:14px;
  }

  .stat-grid {
    display:grid; grid-template-columns:repeat(4, 1fr);
    gap:14px; flex-shrink:0;
  }
  .stat-card {
    background:var(--c1); border-radius:14px;
    border:2px solid var(--bd); padding:18px 20px;
    display:flex; flex-direction:column; gap:4px;
  }
  .sc-label { font-size:12px; color:var(--gr); letter-spacing:2px; text-transform:uppercase; font-weight:700; }
  .sc-num { font-family:'Barlow Condensed', sans-serif; font-size:54px; font-weight:900; line-height:1; }
  .sc-sub { font-size:13px; color:var(--w2); }
  .sc-gn { color:var(--gn); } .sc-rd { color:var(--rd); } .sc-yw { color:var(--yw); } .sc-az { color:var(--az); }
  .stat-card.has-nc { border-color:var(--yw); animation:pulseStatNC 1.6s ease-in-out infinite; }
  @keyframes pulseStatNC {
    0%,100% { box-shadow:0 0 0 0 rgba(245,158,11,.4); }
    50% { box-shadow:0 0 0 8px rgba(245,158,11,0); }
  }

  /* Grid de cards — flui naturalmente, página scrolla se passar */
  #cart-grid-wrap { padding-bottom:30px; }
  .cart-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:12px;
  }
  /* Telas grandes (tablet 1024+ landscape): grid mais denso */
  @media (min-width: 1024px) {
    .cart-grid { grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:14px; }
  }
  @media (min-width: 1440px) {
    .cart-grid { grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; }
  }
  .cart-card-v3 {
    position:relative; cursor:pointer;
    background:var(--c1); border-radius:14px;
    border:3px solid var(--bd); padding:16px 18px;
    transition:transform .15s, border-color .2s, box-shadow .2s;
    min-height:108px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .cart-card-v3:active { transform:scale(.97); }
  .cart-card-v3.st-logado {
    border-color:var(--gn);
    background:linear-gradient(180deg, rgba(34,197,94,.15), var(--c1));
    box-shadow:0 0 14px rgba(34,197,94,.18);
  }
  .cart-card-v3.st-deslogado { border-color:var(--w2); background:linear-gradient(180deg, rgba(200,200,200,.06), var(--c1)); }

<script>
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbx9npOLbFbx0rqiimfhMO35MHf9GMp7sgQX5D4SpDf_wm4jl88vi1CsI_7q0ZXNujeBBg/exec';
const BASES = ['Mooca', 'Osasco', 'SBC'];
const BASE_PREFIX = { Mooca: 'MC', Osasco: 'OC', SBC: 'SC' };
const BASE_COUNT  = { Mooca: 35, Osasco: 50, SBC: 6 };

let _registros = [];
let _ncsAbertas = [];
let _base = null;

// Prioridade: URL ?base=X (sempre vence) → localStorage → picker.
// Se ?base= vier explícito, ATUALIZA o localStorage (permite trocar via link).
// Se abrir sem param, mantém o que tinha salvo (encarregado não muda sozinho).
function detectarBase() {
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('base');
  if (fromUrl && BASES.includes(fromUrl)) {
    _base = fromUrl;
    localStorage.setItem('vammo_enc_base', fromUrl);
    return _base;
  }
  const fromLs = localStorage.getItem('vammo_enc_base');
  if (fromLs && BASES.includes(fromLs)) {
    _base = fromLs;
    return _base;
  }
  return null;
}

function escolherBase(b) {
  _base = b;
  localStorage.setItem('vammo_enc_base', b);
  document.getElementById('picker').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

// ─── UTILS ─────────────────────────────────────────────────────
function normalizeCartName(nome) {
  // Aceita "0C" (zero+C) como alias de "OC" — QR codes impressos com zero em vez de letra O
  let raw = String(nome || '').toUpperCase().replace(/[\s\-_]+/g,'');
  if (/^0C\d+$/.test(raw)) raw = 'OC' + raw.slice(2);
  const m = raw.match(/^(MC|OC|SC)(\d+)$/);
  if (!m) return String(nome || '').trim().toUpperCase();
  return m[1] + ' ' + m[2].padStart(2,'0');
}
function fmtDateFull(iso) { return new Date(iso).toLocaleString('pt-BR'); }
function carrinhosDaBase() {
  // Se o servidor já tem a lista cadastrada no gestor, usa ela (inclui carrinhos novos).
  if (Array.isArray(_cartListServer) && _cartListServer.length) {
    const list = _cartListServer.filter(c => c && c.base === _base);
    if (list.length) return list.slice().sort((a,b) => String(a.nome).localeCompare(String(b.nome)));
  }
  const arr = []; const pre = BASE_PREFIX[_base];
  for (let i = 1; i <= BASE_COUNT[_base]; i++) {
    arr.push({ nome: pre + ' ' + String(i).padStart(2,'0'), base: _base });
  }
  return arr;
}

// ─── JSONP ─────────────────────────────────────────────────────
function gasGet(params, cb) {
  const cbName = '_gas_' + Date.now() + '_' + Math.floor(Math.random()*9999);
  const script = document.createElement('script');
  let done = false;
  const timer = setTimeout(() => { if (!done) { done=true; cleanup(); cb(null, 'timeout'); } }, 25000);
  window[cbName] = function(data) { if (!done) { done=true; cleanup(); cb(data, null); } };
  function cleanup() {
    clearTimeout(timer); delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }
  script.onerror = function() { if (!done) { done=true; cleanup(); cb(null, 'onerror'); } };
  script.src = WEBHOOK_URL + '?' + params + '&callback=' + cbName + '&_=' + Date.now();
  document.head.appendChild(script);
}

// ─── PRESENÇA (celular online + bateria no Headwind) ───────────
const PRESENCE_URL = 'https://script.google.com/macros/s/AKfycbz-yRCeTwX-zxgUVSTAdaRe6ILlnkYgasqBK_lrTMoDFrRnatFQl7YLSYoHZ774ekmIlA/exec';
let _presDevices = [], _presLoaded = false;
function _deburr(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,''); }
function _nameTokens(s){ let v=String(s||''); if(v.indexOf('@')>=0)v=v.split('@')[0].replace(/[._]+/g,' '); return _deburr(v).toLowerCase().replace(/[^a-z\s]/g,' ').trim().split(/\s+/).filter(Boolean); }
function _close(a,b){ if(a===b)return true; const la=a.length,lb=b.length; if(la<3||lb<3||Math.abs(la-lb)>1)return false; let i=0,j=0,ed=0; while(i<la&&j<lb){ if(a[i]===b[j]){i++;j++;continue;} if(++ed>1)return false; if(la>lb)i++; else if(lb>la)j++; else {i++;j++;} } if(i<la||j<lb)ed++; return ed<=1; }
function mecDevice(mec){ if(!_presLoaded)return null; const email=String(mec||'').toLowerCase().trim(); if(email.indexOf('@')>=0){ for(const d of _presDevices){ if(d.email&&d.email===email)return d; } const lp=email.split('@')[0]; if(lp)for(const d of _presDevices){ if(d.email&&d.email.split('@')[0]===lp)return d; } } const mt=_nameTokens(mec); if(!mt.length)return null; const first=mt[0],last=mt[mt.length-1]; for(const d of _presDevices){ if(d.tokens.includes(first)&&d.tokens.includes(last))return d; } for(const d of _presDevices){ if(d.tokens.some(t=>_close(t,first))&&d.tokens.some(t=>_close(t,last)))return d; } return null; }
function batterySvg(lvl){ lvl=Math.max(0,Math.min(100,lvl|0)); const fill=Math.max(2,Math.round(19*lvl/100)); const col=lvl>50?'#22c55e':(lvl>20?'#eab308':'#ef4444'); return `<svg viewBox="0 0 28 16" width="24" height="14"><rect x="1" y="2.5" width="23" height="11" rx="2.5" fill="none" stroke="#aeb6c2" stroke-width="1.6"/><rect x="25" y="5.5" width="2.6" height="5" rx="1" fill="#aeb6c2"/><rect x="3" y="4.5" width="${fill}" height="7" rx="1.4" fill="${col}"/></svg>`; }
function refreshPresence(){
  const cbName='_pg_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  const sc=document.createElement('script'); let done=false;
  const t=setTimeout(()=>{ if(!done){done=true;clean();} }, 20000);
  window[cbName]=function(data){ if(done)return; done=true; clean();
    if(data&&data.ok&&Array.isArray(data.devices)){
      _presDevices=data.devices.map(d=>({tokens:_nameTokens(d.number),online:!!d.online,battery:(typeof d.battery==='number'?d.battery:null),email:(d.email||'').toLowerCase().trim()}));
      _presLoaded=true; try{render();}catch(e){}
    }
  };
  function clean(){ clearTimeout(t); delete window[cbName]; if(sc.parentNode)sc.parentNode.removeChild(sc); }
  sc.onerror=function(){ if(!done){done=true;clean();} };
  sc.src=PRESENCE_URL+'?action=devices&callback='+cbName;
  document.head.appendChild(sc);
}

// ─── TEMPO DE REPARO (estimado) + dificuldade da moto (mesmo do gestor) ───
let _temposReparo = (function(){ try { return JSON.parse(localStorage.getItem('vammo_tempos_reparo_cache')||'null') || {}; } catch { return {}; } })();
function syncTempoReparoFromGAS(){
  gasGet('action=tempoReparoGet', (d, err) => {
    if (err || !d || !d.ok || !d.placas) return;
    _temposReparo = d.placas;
    try { localStorage.setItem('vammo_tempos_reparo_cache', JSON.stringify(_temposReparo)); } catch {}
    try { render(); } catch(e){}
  });
}
function nivelReparo(min){ if (min <= 40) return 'rapido'; if (min <= 120) return 'medio'; return 'dificil'; }
function fmtTempoReparo(min){ if (min < 60) return min + ' min'; const h=Math.floor(min/60), m=min%60; return m>0 ? (h+'h '+m+'min') : (h+'h'); }
function reparoDoMec(mec){
  const email = String(mec||'').toLowerCase().trim(); if (!email) return null;
  const os = _osByEmail[email]; if (!os || !os.placa) return null;
  const r = _temposReparo[os.placa];
  return r ? Object.assign({ placa: os.placa }, r) : null;
}
function reparoPillHtml(mec){
  const r = reparoDoMec(mec); if (!r) return '';
  const nivel = nivelReparo(r.minutos);
  return '<div class="ccv-reparo ' + nivel + '" title="' + r.qtd_pecas + ' pe&ccedil;a(s) na placa ' + r.placa + '">' +
    '<span class="rp-bolinha"></span>' +
    '<span class="rp-tempo">' + fmtTempoReparo(r.minutos) + '</span>' +
    '<span class="rp-qtd">· ' + r.qtd_pecas + ' pe&ccedil;a' + (r.qtd_pecas !== 1 ? 's' : '') + '</span>' +
  '</div>';
}

// Perfis de carrinho (Mecânico/Diagnóstico/Qualidade) — mesmo padrão do gestor
const PERFIL_CORES = { 'Mecânico': '#22c55e', 'Diagnóstico': '#3b82f6', 'Qualidade': '#a855f7' };
let _perfisCfg = (function(){
  try { return JSON.parse(localStorage.getItem('vammo_perfis_cache')||'null'); } catch { return null; }
})();
function getCartPerfil(nome) {
  if (!_perfisCfg || !_perfisCfg.carrinhos) return 'Mecânico';
  const n = normalizeCartName(nome);
  return _perfisCfg.carrinhos[n] || _perfisCfg.carrinhos[nome] || 'Mecânico';
}
function fetchCartList(){
  // 1ª tentativa: presence (perfis com cartList — caminho original do gestor)
  const cbName='_pc_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  const sc=document.createElement('script'); let done=false;
  const t=setTimeout(()=>{ if(!done){done=true;clean(); fetchCartListMain();} }, 12000);
  window[cbName]=function(d){ if(done)return; done=true; clean();
    // Sempre aproveita perfis de carrinho (Mecânico/Diagnóstico/Qualidade) se vier
    if (d && d.ok && d.config && (d.config.perfis || d.config.carrinhos)) {
      _perfisCfg = { perfis: d.config.perfis || {}, carrinhos: d.config.carrinhos || {} };
      try { localStorage.setItem('vammo_perfis_cache', JSON.stringify(_perfisCfg)); } catch {}
    }
    if(d&&d.ok&&d.config&&Array.isArray(d.config.cartList)&&d.config.cartList.length){
      _cartListServer=d.config.cartList;
      try { localStorage.setItem('vammo_carts_server_cache', JSON.stringify(_cartListServer)); } catch {}
      try{render();}catch(e){}
      return;
    }
    // Vazio ou erro: tenta o webhook principal (aba Carrinhos)
    fetchCartListMain();
  };
  function clean(){ clearTimeout(t); delete window[cbName]; if(sc.parentNode)sc.parentNode.removeChild(sc); }
  sc.onerror=function(){ if(!done){done=true;clean(); fetchCartListMain();} };
  sc.src=PRESENCE_URL+'?action=perfisGet&callback='+cbName;
  document.head.appendChild(sc);
}
// Fallback: usa aba Carrinhos do GAS principal (cadastrado via cartAdd/cartRemove)
function fetchCartListMain(){
  gasGet('action=cartsGet', (d) => {
    if (!d || !d.ok || !Array.isArray(d.carts) || !d.carts.length) return;
    _cartListServer = d.carts.map(c => ({ nome: c.nome, base: c.base }));
    try { localStorage.setItem('vammo_carts_server_cache', JSON.stringify(_cartListServer)); } catch {}
    try { render(); } catch(e) {}

// Em moto (IN_PROGRESS via Metabase) · ociosidade = timer no app.
let _osByEmail = {};   // só in_progress: { email: {placa, since} }
let _wasInProg = {};
let _idleStart = {};
try { _idleStart = JSON.parse(localStorage.getItem('vammo_idle_start') || '{}'); } catch(e){ _idleStart = {}; }
function _saveIdleStart(){ try { localStorage.setItem('vammo_idle_start', JSON.stringify(_idleStart)); } catch(e){} }
function fmtElapsedMs(ms){
  let s = Math.max(0, Math.floor((Date.now()-ms)/1000));
  const d = Math.floor(s/86400); s -= d*86400;
  const h = Math.floor(s/3600); s -= h*3600;
  const m = Math.floor(s/60);
  if (d > 0) return d+'d '+h+'h';
  if (h > 0) return h+'h '+m+'min';
  return m+'min';
}
function osBadgeHtml(mec, cartTs){
  const email = String(mec||'').toLowerCase().trim();
  if (!email) return '';
  const o = _osByEmail[email];
  if (o) {
    const ms = Date.parse(o.since) || Date.now();
    return '<div class="ccv-os on" title="Executando OS agora">🏍️ Em moto'+(o.placa?(' · '+o.placa):'')+'<span class="ccv-os-t">há '+fmtElapsedMs(ms)+'</span></div>';
  }
  let sinceMs = _idleStart[email];
  if (!sinceMs || (Date.now() - sinceMs) > 12*3600*1000) { sinceMs = Date.now(); _idleStart[email] = sinceMs; _saveIdleStart(); }
  return '<div class="ccv-os idle" title="Sem moto em andamento">💤 Ocioso<span class="ccv-os-t">há '+fmtElapsedMs(sinceMs)+'</span></div>';
}
function refreshOsStatus(){
  const cbName='_os_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  const sc=document.createElement('script'); let done=false;
  const t=setTimeout(()=>{ if(!done){done=true;clean();} }, 20000);
  window[cbName]=function(d){ if(done)return; done=true; clean();
    if(!d||!d.ok||!d.os) return;
    const inprog={};
    Object.keys(d.os).forEach(e=>{ if(d.os[e] && d.os[e].status==='in_progress') inprog[e]=d.os[e]; });
    let changed=false;
    Object.keys(inprog).forEach(e=>{ _wasInProg[e]=true; if(_idleStart[e]){ delete _idleStart[e]; changed=true; } });
    Object.keys(_wasInProg).forEach(e=>{ if(_wasInProg[e] && !inprog[e]){ _wasInProg[e]=false; if(!_idleStart[e]){ _idleStart[e]=Date.now(); changed=true; } } });
    if(changed) _saveIdleStart();
    _osByEmail=inprog; try{render();}catch(e){}
  };
  function clean(){ clearTimeout(t); delete window[cbName]; if(sc.parentNode)sc.parentNode.removeChild(sc); }
  sc.onerror=function(){ if(!done){done=true;clean();} };
  sc.src=PRESENCE_URL+'?action=osStatus&callback='+cbName;
  document.head.appendChild(sc);
}

function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-badge' + (state === 'ok' ? ' ok' : state === 'loading' ? ' loading' : '');
  document.getElementById('sync-text').textContent = msg;
}

let _ncsResolvidas = []; // [{carrinho, ferramenta, ts, reposta_ts}]
function aplicarFiltroResolvidas() {
  // Filtro 1: NC com Reposta_TS no servidor >= ts de criação → fechada
  const repByCF = {};
  _ncsResolvidas.forEach(rep => {
    const k = normalizeCartName(rep.carrinho||rep.cart||'') + '|' + (rep.ferramenta||'');
    const tms = Date.parse(rep.reposta_ts || rep.ts || 0) || 0;
    if (tms > (repByCF[k] || 0)) repByCF[k] = tms;
  });
  // Filtro 2 (inferência): se um check-in POSTERIOR à NC marcou a ferramenta como "ok",
  // significa que foi reposta — mesmo que o supervisor ainda não tenha registrado isso
  // como Reposta_TS no servidor. Isso elimina divergências entre os apps.
  _registros.forEach(r => {
    if (!r.ferramentas) return;
    const cartN = normalizeCartName(r.carrinho);
    const rTs = Date.parse(r.ts) || 0;
    Object.entries(r.ferramentas).forEach(([ferr, v]) => {
      if (!v || v.status !== 'ok') return;
      const k = cartN + '|' + ferr;
      if (rTs > (repByCF[k] || 0)) repByCF[k] = rTs;
    });
  });
  _ncsAbertas = _ncsAbertas.filter(nc => {
    const k = normalizeCartName(nc.carrinho) + '|' + nc.ferramenta;
    const resTs = repByCF[k], ncTs = Date.parse(nc.ts) || 0;
    return !(resTs && resTs >= ncTs);
  });
}

function carregarTudo() {
  setSyncStatus('loading', 'Atualizando...');
  refreshPresence(); // celular online + bateria (Headwind)
  fetchCartList();   // lista de carrinhos cadastrada no gestor (inclui novos)
  refreshOsStatus(); // em moto / ocioso por mecânico
  syncTempoReparoFromGAS(); // tempo estimado de reparo + dificuldade da moto
  syncFlagIotFromGAS();     // flag de rastreador IoT a remover
  let pending = 3;
  function done() { pending--; if (pending === 0) {
    aplicarFiltroResolvidas();
    setSyncStatus('ok', 'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}));
    render();
  }}
  gasGet('action=sync', (data) => {
    if (data && Array.isArray(data.records)) _registros = data.records;
    done();
  });
  gasGet('action=allOpenNCs', (data) => {
    if (data && Array.isArray(data.ncs)) _ncsAbertas = data.ncs;
    done();
  });
  gasGet('action=ncsResolvidasGet', (data) => {
    if (data && Array.isArray(data.ncs)) _ncsResolvidas = data.ncs;
    done();
  });
}

// Tela cheia + wake-lock pra kiosk em tablet
let _wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => { _wakeLock = null; });
  } catch (e) { console.warn('wakeLock falhou:', e); }
}
async function toggleFullscreen() {
  if (!document.fullscreenElement) {
    try { await document.documentElement.requestFullscreen(); } catch (e) {}
    requestWakeLock();
  } else {
    try { await document.exitFullscreen(); } catch (e) {}
  }
}
// Tenta reativar wakeLock após visibilidade voltar
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && document.fullscreenElement) requestWakeLock();
});
function atualizar() { carregarTudo(); }

function computeCartState(nome) {
  const nameN = normalizeCartName(nome);
  const recsDoCart = _registros.filter(r => normalizeCartName(r.carrinho) === nameN);
  recsDoCart.sort((a,b) => new Date(b.ts) - new Date(a.ts));
  const last = recsDoCart[0] || null;
  let status = 'sem-reg';
  if (last) status = last.tipo === 'checkin' ? 'logado' : 'deslogado';
  const abertas = _ncsAbertas.filter(nc => normalizeCartName(nc.carrinho) === nameN);
  return { status, last, ncAbertas: abertas };
}

  const carts = carrinhosDaBase();
  let totLog=0, totDeslog=0, totSem=0, totNC=0;
  carts.forEach(c => {
    const st = computeCartState(c.nome);
    if (st.status === 'logado') totLog++;
    else if (st.status === 'deslogado') totDeslog++;
    else totSem++;
    if (st.ncAbertas.length > 0) totNC++;

      </div>
      <div>
        ${mec ? `<div class="ccv-mec">👤 ${mec}</div>` : ''}
        ${hora ? `<div class="ccv-time">${data} · ${hora}</div>` : ''}
      </div>
    </div>`;
  }).join('') + '</div>';
}

function renderMiniHistorico(recsDoCart, max, selectedId) {
  max = max || 4;
  if (!recsDoCart || !recsDoCart.length) {
    return '<div class="detail-section"><h4>🕒 Histórico</h4><div style="color:var(--gr);font-size:13px;">Nenhuma operação registrada.</div></div>';
  }
  const items = recsDoCart.slice(0, max).map(r => {
    const isForce = r.forced || (r.id && String(r.id).startsWith('VMO-FORCE'));
    const tipoClass = isForce ? 'force' : (r.tipo === 'checkin' ? 'ci' : 'co');
    const tipoIcon = isForce ? '🔓' : (r.tipo === 'checkin' ? '🟢' : '⚪');
    const tipoLabel = isForce ? 'Force checkout' : (r.tipo === 'checkin' ? 'Check-in' : 'Check-out');
    const obs = r.obs ? ` · ${r.obs}` : '';
    const temFotos = r.fotos && ['sup','inf','elv'].some(k => typeof r.fotos[k] === 'string' && r.fotos[k]);
    const fotoIcon = temFotos ? '<span style="font-size:13px;margin-left:6px;opacity:.85;">📷</span>' : '';
    const idEsc = (r.id || '').replace(/'/g,'');
    const isSelected = selectedId && r.id === selectedId;
    const selStyle = isSelected ? 'background:rgba(0,180,229,.10);box-shadow:inset 3px 0 0 var(--vm);' : '';
    return `<div class="histo-item" onclick="openDetail('${idEsc}')" style="cursor:pointer;${selStyle}">
      <div class="histo-icon ${tipoClass}">${tipoIcon}</div>
      <div>
        <div class="histo-mec">${r.mecanico||'-'}${fotoIcon}</div>
        <div class="histo-sub">${tipoLabel}${obs}${r.nc_count ? ` · ${r.nc_count} NC` : ''}</div>
      </div>
      <div class="histo-time">${fmtDateFull(r.ts)}</div>
    </div>`;
  }).join('');
  const extra = recsDoCart.length > max ? `<div style="text-align:center;font-size:11px;color:var(--gr);margin-top:8px;">+ ${recsDoCart.length - max} operação(ões) mais antigas</div>` : '';
  return `<div class="detail-section"><h4>🕒 Últimas operações (${recsDoCart.length}) <span style="color:var(--gr);font-weight:400;text-transform:none;font-size:11px;margin-left:6px;">clique num log pra ver as fotos</span></h4><div class="histo-list">${items}</div>${extra}</div>`;
}

function openDetail(idOrName) {
  // Aceita: nome do carrinho (do card) OU id de registro (de clique no log)
  let nome, selectedRec;
  const byId = _registros.find(r => r.id === idOrName);
  if (byId) {
    nome = byId.carrinho;
    selectedRec = byId;
  } else {
    nome = idOrName;
  }
  document.getElementById('detail-cart-name').textContent = nome;

  const recsDoCart = _registros.filter(r => normalizeCartName(r.carrinho) === normalizeCartName(nome));
  recsDoCart.sort((a,b) => new Date(b.ts) - new Date(a.ts));
  if (!selectedRec) selectedRec = recsDoCart[0];
  const st = computeCartState(nome);

  const ncsHtml = st.ncAbertas.length
    ? `<div class="detail-section"><h4>⚠ NCs Abertas (${st.ncAbertas.length})</h4>${st.ncAbertas.map(nc => `
        <div class="nc-item">
          <span class="badge ${nc.motivo === 'faltando' ? 'byw' : 'brd'}">${nc.motivo === 'faltando' ? 'Faltando' : 'Quebrado'}</span>
          <strong>${nc.ferramenta}</strong>
          <span style="color:var(--gr);font-size:11px;margin-left:auto;">${nc.mecanico||''}</span>
        </div>`).join('')}</div>`
    : '<div class="detail-section"><div style="color:var(--gn);font-size:13px;">✅ Sem NCs em aberto</div></div>';

  // Fotos: SEMPRE mostra 3 thumbs (Gav. Sup, Gav. Inf, 5S) — do registro selecionado.
  // Clicar num item do mini-histórico recarrega esta seção com as fotos daquele rec.
  let fotosHtml = '';
  if (selectedRec && selectedRec.fotos && ['sup','inf','elv'].some(k => typeof selectedRec.fotos[k] === 'string' && selectedRec.fotos[k])) {
    const tipoIcon = selectedRec.tipo === 'checkin' ? '🟢 Check-in' : '⚪ Check-out';
    const subtitle = `${tipoIcon} · ${selectedRec.mecanico || '-'} · ${fmtDateFull(selectedRec.ts)}`;
    fotosHtml = `<div class="detail-section">
      <h4>📷 Fotos do log selecionado <span style="color:var(--gr);font-weight:400;text-transform:none;font-size:11px;margin-left:6px;">clique pra ampliar</span></h4>
      <div style="font-size:11.5px;color:var(--gr);margin:-4px 0 8px;">${subtitle}</div>
      ${renderFotosInner(selectedRec.fotos)}
    </div>`;
  } else if (selectedRec) {
    fotosHtml = `<div class="detail-section">
      <h4>📷 Fotos do log selecionado</h4>
      <div style="color:var(--gr);font-size:12px;">Este log não tem fotos. Clique num log com 📷 abaixo.</div>
    </div>`;
  }
  const sigHtml = selectedRec && selectedRec.assinatura ? renderAssinatura(selectedRec.assinatura) : '';
  const historicoHtml = renderMiniHistorico(recsDoCart, 4, selectedRec && selectedRec.id);

  const statusBadge = st.status === 'logado'
    ? '<span class="badge bgn">LOGADO</span>'
    : st.status === 'deslogado'
      ? '<span class="badge">DESLOGADO</span>'
      : '<span class="badge" style="background:var(--c2);color:var(--gr);border:1px solid var(--gr);">SEM REGISTRO</span>';

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-row"><span class="lbl">Status</span><span class="val">${statusBadge}</span></div>
    ${ncsHtml}
    ${historicoHtml}
    ${fotosHtml}
    ${sigHtml}
  `;
  document.getElementById('modal-detail').classList.remove('hidden');
}
function closeDetail() { document.getElementById('modal-detail').classList.add('hidden'); }

function driveFileId(url) {
  const m1 = /[?&]id=([a-zA-Z0-9_-]{20,})/.exec(url || '');
  if (m1) return m1[1];
  const m2 = /\/file\/d\/([a-zA-Z0-9_-]{20,})/.exec(url || '');
  if (m2) return m2[1];
  return null;
}
function fotoSrc(val, size) {
  if (!val || typeof val !== 'string') return null;
  if (val.startsWith('data:')) return val;
  const fid = driveFileId(val);
  if (fid) return 'https://drive.google.com/thumbnail?id=' + fid + '&sz=' + (size || 'w400');
  return val;
}
function fotoFullSrc(val) {
  if (!val || typeof val !== 'string') return null;
  if (val.startsWith('data:')) return val;
  const fid = driveFileId(val);
  if (fid) return 'https://drive.google.com/thumbnail?id=' + fid + '&sz=w2000';
  return val;
}

// Render somente o conjunto de 3 thumbs (sem o wrapper detail-section)
function renderFotosInner(fotos) {
  const items = [['sup', 'Gav. Superior'], ['inf', 'Gav. Inferior'], ['elv', '5S Elevador']];
  return `<div class="photo-thumbs">
      ${items.map(([k, lbl]) => {
        const val = fotos[k];
        const thumb = fotoSrc(val, 'w400');
        if (!thumb) {
          if (val === true) {
            return `<div class="photo-card"><div class="ph-empty" style="border-color:var(--gn);color:var(--gn);">✅<br>capturada<br><span style="color:var(--gr);font-size:10px;">sem preview</span></div><div class="ph-label">${lbl}</div></div>`;
          }
          return `<div class="photo-card"><div class="ph-empty">📷<br>sem imagem</div><div class="ph-label">${lbl}</div></div>`;
        }
        const fullEscaped = encodeURIComponent(JSON.stringify(val));
        return `<div class="photo-card">
          <img class="ph-img" src="${thumb}" alt="${lbl}" loading="lazy"
            onclick="openLightbox(decodeURIComponent('${fullEscaped}'), '${lbl}')"
            onerror="this.outerHTML='<div class=&quot;ph-empty&quot; style=&quot;border-color:var(--yw);color:var(--yw);&quot;>⚠️<br>preview falhou</div>'">
          <div class="ph-label">${lbl}</div>
        </div>`;
      }).join('')}
    </div>`;
}
// Compatibilidade: chamada antiga ainda funciona com 1 registro
function renderFotos(fotos) {
  return `<div class="detail-section">
    <h4>📷 Fotos do último registro <span style="color:var(--gr);font-weight:400;text-transform:none;font-size:11px;margin-left:6px;">clique pra ampliar</span></h4>
    ${renderFotosInner(fotos)}
  </div>`;
}

function renderAssinatura(sig) {
  if (typeof sig === 'string' && sig.startsWith('data:')) {
    return `<div class="detail-section"><h4>✍ Assinatura</h4><img class="sig-thumb" src="${sig}" style="max-height:120px;"></div>`;
  }
  return `<div class="detail-section"><h4>✍ Assinatura</h4><div style="color:var(--gn);font-size:13px;">✅ Assinatura coletada no celular</div></div>`;
}

function openLightbox(rawVal, label) {
  const val = JSON.parse(rawVal);
  const big = fotoFullSrc(val);
  if (!big) return;
  document.getElementById('lightbox-img').src = big;
  document.getElementById('lightbox-caption').textContent = label || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
  else if (!document.getElementById('modal-detail').classList.contains('hidden')) closeDetail();
});

function initApp() {
  render();
  carregarTudo();
  setInterval(carregarTudo, 30000);
  // Sync EXTRA só das NCs a cada 12s — NCs são críticas pro encarregado ver fresh
  setInterval(() => {
    let waiting = 2;
    function maybeRender() {
      waiting--;
      if (waiting === 0) {
        aplicarFiltroResolvidas();
        try { render(); } catch(e){}
      }
    }
    gasGet('action=allOpenNCs', (data) => {
      if (data && Array.isArray(data.ncs)) _ncsAbertas = data.ncs;
      maybeRender();
    });
    gasGet('action=ncsResolvidasGet', (data) => {
      if (data && Array.isArray(data.ncs)) _ncsResolvidas = data.ncs;
      maybeRender();
    });
  }, 12000);
  // Sync imediato quando a aba volta a ficar visível (kiosk-friendly)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') carregarTudo();
  });
}

// ─── INIT ────────────────────────────────────────────────────
(function bootstrap() {
  const b = detectarBase();
  if (!b) {
    document.getElementById('picker').style.display = 'flex';
  } else {
    document.getElementById('app').style.display = 'block';
    initApp();
  }
})();
</script>
